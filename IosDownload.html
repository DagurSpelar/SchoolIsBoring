<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Download iOS App</title>

<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#080810;
  --sf:#0f0f1a;
  --sf2:#181825;
  --br:rgba(255,255,255,.08);
  --ac:#7c6aff;
  --acg:rgba(124,106,255,.25);
  --tx:#f2f2ff;
  --mu:#8b8bb0;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Bricolage Grotesque',sans-serif;
  background:var(--bg);
  color:var(--tx);
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* NAV */
nav{
  height:70px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 30px;
  background:rgba(8,8,16,.8);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--br);
}

.logo{
  font-weight:800;
  font-size:20px;
}

.logo span{
  color:var(--ac);
}

/* HERO */
.hero{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 20px;
}

.card{
  background:var(--sf);
  border:1px solid var(--br);
  border-radius:20px;
  padding:50px 40px;
  max-width:500px;
  width:100%;
  box-shadow:0 10px 40px rgba(0,0,0,.5);
}

h1{
  font-size:2.2rem;
  margin-bottom:10px;
}

.grad{
  background:linear-gradient(90deg,var(--ac),#9b8eff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

p{
  color:var(--mu);
  margin-bottom:30px;
  font-size:15px;
}

/* BUTTON */
.download-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  height:55px;
  padding:0 30px;
  font-weight:700;
  font-size:16px;
  border-radius:14px;
  border:none;
  cursor:pointer;
  background:linear-gradient(135deg,var(--ac),#9b8eff);
  color:#fff;
  box-shadow:0 6px 25px var(--acg);
  transition:.25s;
  text-decoration:none;
}

.download-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 35px var(--acg);
}

/* ICON */
.icon{
  font-size:60px;
  margin-bottom:20px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:var(--mu);
  border-top:1px solid var(--br);
}
</style>
</head>

<body>

<nav>
  <div class="logo">SchoolIs<span>Boring</span></div>
</nav>

<section class="hero">
  <div class="card">

    <div class="icon">📱</div>

    <h1>Download for <span class="grad">iOS</span></h1>

    <p>
      Get the full experience on your iPhone or iPad. Fast, smooth, and built for mobile.
    </p>

    <a href="https://dagurspelar.github.io/SchoolIsBoring/IosDownload_Complete" class="download-btn">
      Download Now
    </a>

  </div>
</section>

<footer>
  © 2026 SchoolisBoring — All rights reserved
</footer>

</body>
</html>
