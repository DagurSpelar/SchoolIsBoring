<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr Bullet — SchoolIsBoring</title>
  <link rel="icon" type="image/jpeg" href="https://img.poki-cdn.com/cdn-cgi/image/q=78,scq=50,width=1200,height=1200,fit=cover,f=png/d499967bc8e1634c9ffa5d83d8cc4a49/mr-bullet.png">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0d0d12;
  --surface: #16161f;
  --border: rgba(255,255,255,0.07);
  --accent: #6c63ff;
  --text: #f0f0f8;
  --muted: #7c7c9a;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  height: 100vh;
  overflow: hidden;
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: rgba(13,13,18,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  z-index: 1000;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  color: var(--text);
  text-decoration: none;
  font-size: 18px;
}

.logo span {
  color: var(--accent);
}

/* BUTTONS */
.btn {
  background: var(--accent);
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  transition: 0.2s;
  text-decoration: none;
}

.btn:hover {
  transform: translateY(-1px);
  background: #7d75ff;
}

.controls {
  display: flex;
  gap: 10px;
}

/* LOADING SCREEN */
.loading-screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  background: radial-gradient(circle at center, #1a1a2a, var(--bg));
  z-index: 2000;
}

.spinner {
  width: 60px;
  height: 60px;
  border: 5px solid rgba(255,255,255,0.1);
  border-top: 5px solid var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 20px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  font-size: 16px;
  color: var(--muted);
  margin-bottom: 10px;
}

.progress-bar {
  width: 200px;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  overflow: hidden;
}

.progress {
  height: 100%;
  width: 0%;
  background: var(--accent);
  animation: load 3s ease forwards;
}

@keyframes load {
  to { width: 100%; }
}

/* READY SCREEN */
.ready-screen {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  background: var(--bg);
  z-index: 2000;
}

.ready-screen h1 {
  margin-bottom: 20px;
}

.ready-screen .btn {
  font-size: 16px;
  padding: 14px 22px;
}

/* GAME */
.game-container {
  position: absolute;
  top: 60px;
  left: 0;
  width: 100%;
  height: calc(100% - 60px);
  display: none;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <a href="https://dagurspelar.github.io/SchoolIsBoring" class="logo">
    SchoolIs<span>Boring</span>
  </a>

  <div class="controls">
    <button class="btn" onclick="shareGame()">Share</button>
    <button class="btn" onclick="toggleFullscreen()">Fullscreen</button>
  </div>
</div>

<!-- LOADING -->
<div class="loading-screen" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Loading game...</div>
  <div class="progress-bar">
    <div class="progress"></div>
  </div>
</div>

<!-- READY SCREEN -->
<div class="ready-screen" id="ready">
  <h1>Your game is ready 🎮</h1>
  <button class="btn" onclick="startGame()">Play</button>
</div>

<!-- GAME -->
<div class="game-container" id="game">
  <iframe src="https://fly.silvergames.com/m/mr-bullet/"></iframe>
</div>

<script>
function startGame() {
  document.getElementById("ready").style.display = "none";
  document.getElementById("game").style.display = "block";
}

function toggleFullscreen() {
  const elem = document.documentElement;

  if (!document.fullscreenElement) {
    elem.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

function shareGame() {
  if (navigator.share) {
    navigator.share({
      title: "Play on SchoolIsBoring",
      text: "Check out this game!",
      url: window.location.href
    });
  } else {
    alert("Sharing not supported on this browser");
  }
}

// Fake loading delay
setTimeout(() => {
  document.getElementById("loading").style.display = "none";
  document.getElementById("ready").style.display = "flex";
}, 3500);
</script>

</body>
</html>
